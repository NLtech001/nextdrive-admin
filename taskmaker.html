<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager - Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #111; min-height: 100vh; }
    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 70px;
      background: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000;
    }
    .header-title { font-size: 1.5rem; font-weight: 700; color: #1a73e8; }
    .add-btn {
      background: #e63939; color: white; border: none; padding: 10px 20px;
      border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    .main { padding-top: 90px; padding: 20px; max-width: 480px; margin: 0 auto; }
    .filter-bar { margin-bottom: 20px; }
    select, input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; margin-bottom: 10px; }
    select:disabled, input:disabled { background: #f0f0f0; cursor: not-allowed; opacity: 0.7; }
    .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; font-size: 1.05rem; font-weight: 500; }
    .checkbox-group input { width: auto; margin: 0; transform: scale(1.4); }

    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card {
      background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      position: relative;
    }
    .task-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
    .task-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 6px; }
    .task-info { font-size: 0.9rem; color: #555; margin-bottom: 8px; line-height: 1.5; }
    .rating { color: #ffc107; font-size: 1.2rem; }

    .actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
    .action-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .edit-btn { background: #1a73e8; }
    .delete-btn { background: #e63939; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content {
      background: white; border-radius: 20px; width: 92%; max-width: 440px; max-height: 92vh;
      overflow-y: auto; padding: 25px; position: relative;
    }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 32px; cursor: pointer; color: #999; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
    .submit-btn {
      width: 100%; padding: 16px; background: #1a73e8; color: white; border: none;
      border-radius: 50px; font-size: 1.1rem; font-weight: 700; margin-top: 10px; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 14px 24px; border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: 500; z-index: 10000;
      opacity: 0; transition: opacity 0.4s ease; display: flex; align-items: center; gap: 10px;
    }
    .toast.success { background: #4caf50; }
    .toast.error { background: #e63939; }
  </style>
</head>
<body>

<header>
  <div class="header-title">Task Manager</div>
  <button class="add-btn" onclick="openAddModal()">
    <i class="fas fa-plus"></i> Add New Task
  </button>
</header>

<div class="main">
  <div class="filter-bar">
    <select id="packageFilter" onchange="filterTasks()">
      <option value="all">All Tasks</option>
      <option value="silver-1">Silver Hall Level 1</option>
      <option value="silver-2">Silver Hall Level 2</option>
      <option value="silver-3">Silver Hall Level 3</option>
      <option value="gold-1">Gold Hall Level 1</option>
      <option value="gold-2">Gold Hall Level 2</option>
      <option value="gold-3">Gold Hall Level 3</option>
      <option value="diamond-1">Diamond Hall Level 1</option>
      <option value="diamond-2">Diamond Hall Level 2</option>
      <option value="diamond-3">Diamond Hall Level 3</option>
      <option value="bronze">Bronze Tasks (task2.html)</option>
    </select>
  </div>

  <div class="task-list" id="taskList">
    <p style="text-align:center; color:#777; padding:60px 20px;">Loading tasks...</p>
  </div>
</div>

<!-- Task Modal -->
<div id="taskModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <h2 id="modalTitle">Add New Task</h2>

    <div class="form-group">
      <label>Task Name *</label>
      <input type="text" id="taskName" placeholder="Toyota Car Service Review" required>
    </div>

    <div class="form-group">
      <label>Select Package *</label>
      <select id="taskPackage" required>
        <option value="">Select Package</option>
        <option value="silver-1">Silver Hall Level 1</option>
        <option value="silver-2">Silver Hall Level 2</option>
        <option value="silver-3">Silver Hall Level 3</option>
        <option value="gold-1">Gold Hall Level 1</option>
        <option value="gold-2">Gold Hall Level 2</option>
        <option value="gold-3">Gold Hall Level 3</option>
        <option value="diamond-1">Diamond Hall Level 1</option>
        <option value="diamond-2">Diamond Hall Level 2</option>
        <option value="diamond-3">Diamond Hall Level 3</option>
      </select>
    </div>

    <div class="form-group">
      <label>Profit Amount (৳) *</label>
      <input type="number" id="taskProfit" placeholder="500" min="0" step="0.01" required>
    </div>

    <div class="form-group">
      <label>Car Brand</label>
      <input type="text" id="carBrand" placeholder="Toyota, Honda, BMW">
    </div>

    <div class="form-group">
      <label>Service Center</label>
      <input type="text" id="serviceCenter" placeholder="Dhaka Auto Care">
    </div>

    <div class="form-group">
      <label>Car Rating</label>
      <div class="star-rating" id="starRating"></div>
      <input type="hidden" id="carRating" value="5">
    </div>

    <div class="form-group">
      <label>Image URL</label>
      <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" oninput="previewImage(this.value)">
      <img id="imagePreview" style="width:100%; margin-top:10px; border-radius:12px; display:none; max-height:180px; object-fit:cover;">
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="bronzeTask" onchange="toggleBronze()">
      <label for="bronzeTask">This is a Bronze Task (will show in task2.html)</label>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="saveTask()">Add Task</button>
  </div>
</div>

<div id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentEditingTaskId = null;
let selectedRating = 5;

// Toast Notification
function showToast(message, type = "success") {
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
  document.getElementById("toastContainer").appendChild(toast);

  setTimeout(() => toast.style.opacity = "1", 10);
  setTimeout(() => {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 400);
  }, 3200);
}

// Star Rating System
function createStarRating() {
  const container = document.getElementById("starRating");
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement("span");
    star.innerHTML = "★";
    star.style.marginRight = "6px";
    star.style.fontSize = "1.4rem";
    star.style.color = (i <= selectedRating) ? "#ffc107" : "#e0e0e0";
    star.style.cursor = "pointer";
    star.onclick = () => {
      selectedRating = i;
      document.getElementById("carRating").value = i;
      createStarRating();
    };
    container.appendChild(star);
  }
}

function previewImage(url) {
  const preview = document.getElementById("imagePreview");
  if (url && url.trim().startsWith("http")) {
    preview.src = url.trim();
    preview.style.display = "block";
  } else {
    preview.style.display = "none";
  }
}

// Toggle Bronze Task
function toggleBronze() {
  const isBronze = document.getElementById("bronzeTask").checked;
  const packageSelect = document.getElementById("taskPackage");

  if (isBronze) {
    packageSelect.value = "bronze";
    packageSelect.disabled = true;
  } else {
    packageSelect.disabled = false;
    if (packageSelect.value === "bronze") packageSelect.value = "";
  }
}

// Open Add Modal
function openAddModal() {
  currentEditingTaskId = null;
  document.getElementById("modalTitle").textContent = "Add New Task";
  document.getElementById("submitBtn").textContent = "Add Task";

  document.getElementById("taskName").value = "";
  document.getElementById("taskPackage").value = "";
  document.getElementById("taskProfit").value = "";
  document.getElementById("carBrand").value = "";
  document.getElementById("serviceCenter").value = "";
  document.getElementById("imageUrl").value = "";
  document.getElementById("imagePreview").style.display = "none";
  document.getElementById("bronzeTask").checked = false;

  selectedRating = 5;
  document.getElementById("carRating").value = 5;
  createStarRating();

  toggleBronze();

  document.getElementById("taskModal").style.display = "flex";
}

// Close Modal
function closeModal() {
  document.getElementById("taskModal").style.display = "none";
}

// Save / Update Task
async function saveTask() {
  const isBronze = document.getElementById("bronzeTask").checked;
  const packageKey = document.getElementById("taskPackage").value.trim();

  const taskData = {
    taskName:      document.getElementById("taskName").value.trim(),
    profit:        Number(document.getElementById("taskProfit").value) || 0,
    carBrand:      document.getElementById("carBrand").value.trim(),
    serviceCenter: document.getElementById("serviceCenter").value.trim(),
    carRating:     Number(document.getElementById("carRating").value) || 5,
    imageUrl:      document.getElementById("imageUrl").value.trim(),
    bronzeTask:    isBronze,
    packageKey:    isBronze ? "bronze" : packageKey,
    createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:     firebase.firestore.FieldValue.serverTimestamp()
  };

  // Validation
  if (!taskData.taskName)               return showToast("Task Name is required!", "error");
  if (taskData.profit <= 0)             return showToast("Profit must be greater than 0!", "error");

  if (!taskData.packageKey) {
    return showToast("Please select a Package!", "error");
  }

  try {
    if (currentEditingTaskId) {
      await db.collection("tasks").doc(currentEditingTaskId).update(taskData);
      showToast("Task updated successfully!", "success");
    } else {
      await db.collection("tasks").add(taskData);
      showToast("New task added successfully!", "success");
    }

    closeModal();
    filterTasks();
  } catch (err) {
    showToast("Error saving task: " + err.message, "error");
    console.error("Save error:", err);
  }
}

// Load & Filter Tasks
async function loadTasks(filter = "all") {
  let query = db.collection("tasks").orderBy("createdAt", "desc");

  if (filter !== "all") {
    query = query.where("packageKey", "==", filter);
  }

  try {
    const snap = await query.get();
    const container = document.getElementById("taskList");
    container.innerHTML = "";

    if (snap.empty) {
      container.innerHTML = `<p style="text-align:center; color:#777; padding:60px 20px;">No tasks found.</p>`;
      return;
    }

    snap.forEach(doc => {
      const t = doc.data();
      const packageDisplay = t.packageKey ? getPackageDisplayName(t.packageKey) : (t.bronzeTask ? 'Bronze (task2.html)' : '—');

      const div = document.createElement("div");
      div.className = "task-card";
      div.innerHTML = `
        ${t.imageUrl ? `<img src="${t.imageUrl}" class="task-img" alt="${t.taskName}">` : ''}
        <div class="task-name">${t.taskName || '—'}</div>
        <div class="task-info">
          <strong>Package:</strong> ${packageDisplay}<br>
          <strong>Profit:</strong> ৳${Number(t.profit || 0).toFixed(2)}<br>
          <strong>Brand:</strong> ${t.carBrand || '—'}<br>
          ${t.bronzeTask ? '<strong style="color:#e63939">Bronze Task: Yes (task2.html)</strong>' : '<strong>Normal Task</strong>'}
        </div>
        <div class="rating">${'★'.repeat(Math.round(t.carRating || 0))}</div>

        <div class="actions">
          <button class="action-btn edit-btn" onclick="editTask('${doc.id}')" title="Edit">
            <i class="fas fa-edit"></i>
          </button>
          <button class="action-btn delete-btn" onclick="deleteTask('${doc.id}')" title="Delete">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `;
      container.appendChild(div);
    });
  } catch (err) {
    showToast("Failed to load tasks: " + err.message, "error");
    console.error("Load tasks error:", err);
  }
}

// Helper to display package name
function getPackageDisplayName(key) {
  if (key === "bronze") return "Bronze Tasks";
  const [hall, level] = key.split("-");
  return `${hall.charAt(0).toUpperCase() + hall.slice(1)} Hall Level ${level}`;
}

// Edit Task
async function editTask(taskId) {
  try {
    const doc = await db.collection("tasks").doc(taskId).get();
    if (!doc.exists) return showToast("Task not found", "error");

    const t = doc.data();
    currentEditingTaskId = taskId;

    document.getElementById("modalTitle").textContent = "Edit Task";
    document.getElementById("submitBtn").textContent = "Update Task";

    document.getElementById("taskName").value      = t.taskName || "";
    document.getElementById("taskPackage").value   = t.packageKey || "";
    document.getElementById("taskProfit").value    = t.profit || "";
    document.getElementById("carBrand").value      = t.carBrand || "";
    document.getElementById("serviceCenter").value = t.serviceCenter || "";
    document.getElementById("imageUrl").value      = t.imageUrl || "";
    document.getElementById("bronzeTask").checked  = !!t.bronzeTask;

    selectedRating = Math.round(t.carRating || 5);
    document.getElementById("carRating").value = selectedRating;

    previewImage(t.imageUrl || "");
    createStarRating();
    toggleBronze();

    document.getElementById("taskModal").style.display = "flex";
  } catch (err) {
    showToast("Failed to load task data: " + err.message, "error");
    console.error("Edit task error:", err);
  }
}

// Delete Task
async function deleteTask(taskId) {
  if (!confirm("Are you sure you want to delete this task?")) return;
  try {
    await db.collection("tasks").doc(taskId).delete();
    showToast("Task deleted successfully", "success");
    filterTasks();
  } catch (err) {
    showToast("Failed to delete task: " + err.message, "error");
    console.error("Delete error:", err);
  }
}

// Filter Tasks
function filterTasks() {
  const filterValue = document.getElementById("packageFilter")?.value || "all";
  loadTasks(filterValue);
}

// Initialize
window.addEventListener('load', () => {
  createStarRating();
  loadTasks("all");

  const bronzeCheckbox = document.getElementById("bronzeTask");
  if (bronzeCheckbox) {
    bronzeCheckbox.addEventListener("change", toggleBronze);
  }
});
</script>
</body>
</html>
