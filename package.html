<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manage Membership Packages</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 16px; min-height: 100vh; }
    .container { max-width: 900px; margin: 20px auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1, h2 { text-align: center; margin-bottom: 24px; color: #1a1a1a; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; }
    input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #e63939; box-shadow: 0 0 0 3px rgba(230,57,57,0.1); }
    button { background: #e63939; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #c62828; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .primary-btn { width: 100%; padding: 16px; font-size: 17px; margin-top: 12px; background: #1a73e8; }
    .primary-btn:hover { background: #1557b0; }
    .message { padding: 12px; border-radius: 8px; text-align: center; margin: 16px 0; font-size: 15px; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error   { background: #ffebee; color: #c62828; }
    .packages-list { margin-top: 40px; }
    .package-card { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .package-info { flex: 1; }
    .package-info h3 { margin: 0 0 8px; color: #1a73e8; font-size: 1.2rem; }
    .package-info p { margin: 4px 0; font-size: 14px; color: #555; }
    .actions { display: flex; gap: 12px; flex-shrink: 0; }
    .edit-btn { background: #1a73e8; padding: 8px 16px; font-size: 14px; }
    .edit-btn:hover { background: #1557b0; }
    .delete-btn { background: #d32f2f; padding: 8px 16px; font-size: 14px; }
    .delete-btn:hover { background: #b71c1c; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 16px; right: 20px; font-size: 32px; cursor: pointer; color: #777; }
    .close-btn:hover { color: #333; }
    @media (max-width: 600px) { 
      .container { padding: 20px 14px; } 
      .package-card { flex-direction: column; align-items: flex-start; gap: 16px; } 
      .actions { width: 100%; justify-content: flex-end; } 
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Manage Membership Packages</h1>

  <!-- Add Package Form -->
  <div style="margin-bottom: 48px;">
    <h2>Add New Package</h2>
    
    <form id="packageForm">
      <div class="form-group">
        <label for="hall">Hall *</label>
        <select id="hall" required>
          <option value="">Select Hall</option>
          <option value="Bronze Hall">Bronze Hall</option>
          <option value="Silver Hall">Silver Hall</option>
          <option value="Gold Hall">Gold Hall</option>
          <option value="Diamond Hall">Diamond Hall</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Package Name *</label>
        <input type="text" id="name" placeholder="যেমন: Monthly VIP, Basic Plan" required />
      </div>

      <div class="form-group">
        <label for="level">Level *</label>
        <select id="level" required>
          <option value="">Select Level</option>
          <option value="Free Level">Free Level</option>
          <option value="Level-1">Level-1</option>
          <option value="Level-2">Level-2</option>
          <option value="Level-3">Level-3</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Price (৳) *</label>
        <input type="number" id="price" placeholder="যেমন: 499" min="0" required />
      </div>

      <div class="form-group">
        <label for="durationDays">Duration (days) *</label>
        <input type="number" id="durationDays" placeholder="যেমন: 30" min="1" value="30" required />
      </div>

      <div class="form-group">
        <label for="commissionRate">Commission Rate (%) *</label>
        <input type="number" id="commissionRate" placeholder="যেমন: 10" min="0" max="100" step="0.1" required />
      </div>

      <div class="form-group">
        <label for="priceMultiplier">Price Multiplier *</label>
        <input type="number" id="priceMultiplier" step="0.01" value="1.00" min="0.1" required />
      </div>

      <div class="form-group">
        <label for="commissionMultiplier">Commission Multiplier *</label>
        <input type="number" id="commissionMultiplier" step="0.01" value="1.00" min="0.1" required />
      </div>

      <div class="form-group">
        <label for="taskCount">Task Count (optional)</label>
        <input type="number" id="taskCount" placeholder="যেমন: 15" min="0" value="0" />
      </div>

      <button type="submit" id="submitBtn" class="primary-btn">Add Package</button>
    </form>

    <div id="message" class="message" style="display:none;"></div>
  </div>

  <!-- Existing Packages -->
  <div class="packages-list">
    <h2>Existing Packages</h2>
    <div id="packagesContainer"></div>
    <div id="noPackages" style="text-align:center; color:#777; padding:40px; display:none;">
      এখনো কোনো মেম্বারশিপ প্যাকেজ যোগ করা হয়নি।
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h2>Edit Package</h2>
    
    <form id="editForm">
      <input type="hidden" id="editDocId" />

      <div class="form-group">
        <label for="editHall">Hall *</label>
        <select id="editHall" required>
          <option value="">Select Hall</option>
          <option value="Bronze Hall">Bronze Hall</option>
          <option value="Silver Hall">Silver Hall</option>
          <option value="Gold Hall">Gold Hall</option>
          <option value="Diamond Hall">Diamond Hall</option>
        </select>
      </div>

      <div class="form-group">
        <label for="editName">Package Name *</label>
        <input type="text" id="editName" required />
      </div>

      <div class="form-group">
        <label for="editLevel">Level *</label>
        <select id="editLevel" required>
          <option value="">Select Level</option>
          <option value="Free Level">Free Level</option>
          <option value="Level-1">Level-1</option>
          <option value="Level-2">Level-2</option>
          <option value="Level-3">Level-3</option>
        </select>
      </div>

      <div class="form-group">
        <label for="editPrice">Price (৳) *</label>
        <input type="number" id="editPrice" min="0" required />
      </div>

      <div class="form-group">
        <label for="editDurationDays">Duration (days) *</label>
        <input type="number" id="editDurationDays" min="1" required />
      </div>

      <div class="form-group">
        <label for="editCommissionRate">Commission Rate (%) *</label>
        <input type="number" id="editCommissionRate" min="0" max="100" step="0.1" required />
      </div>

      <div class="form-group">
        <label for="editPriceMultiplier">Price Multiplier *</label>
        <input type="number" id="editPriceMultiplier" step="0.01" min="0.1" required />
      </div>

      <div class="form-group">
        <label for="editCommissionMultiplier">Commission Multiplier *</label>
        <input type="number" id="editCommissionMultiplier" step="0.01" min="0.1" required />
      </div>

      <div class="form-group">
        <label for="editTaskCount">Task Count (optional)</label>
        <input type="number" id="editTaskCount" min="0" />
      </div>

      <button type="submit" id="saveEditBtn" class="primary-btn">Save Changes</button>
    </form>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Admin auth check (আপনার সিস্টেম অনুযায়ী রাখা হয়েছে)
if (localStorage.getItem('adminLoggedIn') !== 'true') {
  alert("অ্যাডমিন অ্যাক্সেস নেই। দয়া করে লগইন করুন।");
  window.location.href = "index.html";
}

const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9",
  measurementId: "G-DS97G2VVZ4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const addForm = document.getElementById('packageForm');
const messageDiv = document.getElementById('message');
const submitBtn = document.getElementById('submitBtn');

// Add Package
addForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const values = {
    hall:                document.getElementById('hall').value.trim(),
    name:                document.getElementById('name').value.trim(),
    level:               document.getElementById('level').value.trim(),
    price:               Number(document.getElementById('price').value),
    durationDays:        Number(document.getElementById('durationDays').value),
    commissionRate:      Number(document.getElementById('commissionRate').value),
    priceMultiplier:     Number(document.getElementById('priceMultiplier').value),
    commissionMultiplier: Number(document.getElementById('commissionMultiplier').value),
    taskCount:           Number(document.getElementById('taskCount').value) || 0
  };

  if (!values.hall || !values.name || !values.level || isNaN(values.price) || isNaN(values.durationDays) || isNaN(values.commissionRate)) {
    showMessage("সব আবশ্যিক ফিল্ড পূরণ করুন", "error");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "যোগ হচ্ছে...";

  try {
    await db.collection("packages").add({
      ...values,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    showMessage("প্যাকেজ সফলভাবে যোগ হয়েছে!", "success");
    addForm.reset();
    loadPackages();
  } catch (err) {
    showMessage("যোগ করতে সমস্যা: " + err.message, "error");
    console.error(err);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Add Package";
  }
});

function showMessage(text, type) {
  messageDiv.textContent = text;
  messageDiv.className = "message " + type;
  messageDiv.style.display = "block";
  setTimeout(() => messageDiv.style.display = "none", 6000);
}

// Modal control
const modal = document.getElementById('editModal');
const editForm = document.getElementById('editForm');

function openModal() { modal.style.display = "flex"; }
function closeModal() { 
  modal.style.display = "none"; 
  editForm.reset(); 
}

modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});

// Edit form submit
editForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const docId = document.getElementById('editDocId').value;
  if (!docId) return;

  const values = {
    hall:                document.getElementById('editHall').value.trim(),
    name:                document.getElementById('editName').value.trim(),
    level:               document.getElementById('editLevel').value.trim(),
    price:               Number(document.getElementById('editPrice').value),
    durationDays:        Number(document.getElementById('editDurationDays').value),
    commissionRate:      Number(document.getElementById('editCommissionRate').value),
    priceMultiplier:     Number(document.getElementById('editPriceMultiplier').value),
    commissionMultiplier: Number(document.getElementById('editCommissionMultiplier').value),
    taskCount:           Number(document.getElementById('editTaskCount').value) || 0
  };

  if (!values.hall || !values.name || !values.level || isNaN(values.price) || isNaN(values.durationDays)) {
    showMessage("সব আবশ্যিক ফিল্ড পূরণ করুন", "error");
    return;
  }

  const saveBtn = document.getElementById('saveEditBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = "সেভ হচ্ছে...";

  try {
    await db.collection("packages").doc(docId).update({
      ...values,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    showMessage("প্যাকেজ আপডেট সফল হয়েছে!", "success");
    closeModal();
    loadPackages();
  } catch (err) {
    showMessage("আপডেটে সমস্যা: " + err.message, "error");
    console.error(err);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Changes";
  }
});

// Load & Display Packages
async function loadPackages() {
  const container = document.getElementById("packagesContainer");
  const noPackages = document.getElementById("noPackages");
  container.innerHTML = '<p style="text-align:center;color:#999;">লোড হচ্ছে...</p>';

  try {
    const snap = await db.collection("packages")
      .orderBy("createdAt", "desc")
      .get();

    container.innerHTML = "";

    if (snap.empty) {
      noPackages.style.display = "block";
      return;
    }

    noPackages.style.display = "none";

    snap.forEach(doc => {
      const d = doc.data();
      const id = doc.id;

      const card = document.createElement("div");
      card.className = "package-card";
      card.innerHTML = `
        <div class="package-info">
          <h3>${d.hall} • ${d.name}</h3>
          <p><strong>Level:</strong> ${d.level || "—"}</p>
          <p><strong>মূল্য:</strong> ৳${d.price || 0} • ${d.durationDays || "?"} দিন</p>
          <p><strong>কমিশন:</strong> ${d.commissionRate || 0}% • Tasks: ${d.taskCount || 0}</p>
        </div>
        <div class="actions">
          <button class="edit-btn" onclick="editPackage('${id}')">Edit</button>
          <button class="delete-btn" onclick="deletePackage('${id}', '${(d.hall + " - " + d.name).replace(/'/g, "\\'")}')">Delete</button>
        </div>
      `;
      container.appendChild(card);
    });
  } catch (err) {
    container.innerHTML = '<p style="color:#c62828;text-align:center;">লোড করতে সমস্যা হয়েছে</p>';
    console.error(err);
  }
}

async function editPackage(docId) {
  try {
    const docSnap = await db.collection("packages").doc(docId).get();
    if (!docSnap.exists) {
      showMessage("প্যাকেজ খুঁজে পাওয়া যায়নি", "error");
      return;
    }

    const d = docSnap.data();

    document.getElementById('editDocId').value          = docId;
    document.getElementById('editHall').value           = d.hall || '';
    document.getElementById('editName').value           = d.name || '';
    document.getElementById('editLevel').value          = d.level || '';
    document.getElementById('editPrice').value          = d.price || '';
    document.getElementById('editDurationDays').value   = d.durationDays || 30;
    document.getElementById('editCommissionRate').value = d.commissionRate || '';
    document.getElementById('editPriceMultiplier').value = d.priceMultiplier || 1;
    document.getElementById('editCommissionMultiplier').value = d.commissionMultiplier || 1;
    document.getElementById('editTaskCount').value      = d.taskCount || 0;

    openModal();
  } catch (err) {
    showMessage("এডিট ফর্ম লোড করতে সমস্যা", "error");
    console.error(err);
  }
}

async function deletePackage(docId, packageName) {
  if (!confirm(`"${packageName}" প্যাকেজটি স্থায়ীভাবে মুছে ফেলতে চান?`)) return;

  try {
    await db.collection("packages").doc(docId).delete();
    showMessage("প্যাকেজ মুছে ফেলা হয়েছে", "success");
    loadPackages();
  } catch (err) {
    showMessage("মুছতে ব্যর্থ: " + err.message, "error");
    console.error(err);
  }
}

// Initial load
window.addEventListener('load', loadPackages);
</script>

</body>
</html>
