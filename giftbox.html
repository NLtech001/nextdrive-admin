<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Box Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1, h2 {
      text-align: center;
      color: #1a73e8;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
    }
    select, input[type=number], input[type=checkbox] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }
    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    #saveBtn {
      background: linear-gradient(90deg, #1a73e8, #0d47a1);
      color: white;
    }
    #clearBtn {
      background: #e0e0e0;
      color: #333;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .success-msg {
      color: #28a745;
      text-align: center;
      margin: 20px 0;
      font-weight: 500;
    }
    .error-msg {
      color: #dc3545;
      text-align: center;
      margin: 20px 0;
      font-weight: 500;
    }
    .note {
      font-size: 0.88rem;
      color: #666;
      margin-top: -6px;
      margin-bottom: 18px;
    }
    .editing-info {
      text-align: center;
      color: #1a73e8;
      font-weight: 500;
      margin: 12px 0;
      font-size: 1.05rem;
      background: #e3f2fd;
      padding: 10px;
      border-radius: 8px;
    }
    .table-container {
      margin-top: 45px;
      overflow-x: auto;
      border: 1px solid #eee;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #1a73e8;
      color: white;
      font-weight: 600;
    }
    tr:hover {
      background: #f8fbff;
    }
    .status-enabled { color: #28a745; font-weight: 600; }
    .status-disabled { color: #dc3545; font-weight: 600; }
    .timestamp { font-size: 0.86rem; color: #555; }
    .action-btn {
      padding: 7px 14px;
      font-size: 0.92rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-right: 6px;
    }
    .edit-btn {
      background: #ffc107;
      color: #333;
    }
    .edit-btn:hover {
      background: #e0a800;
      color: white;
    }
    .delete-btn {
      background: #dc3545;
      color: white;
    }
    .delete-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Gift Box Config Admin</h1>

  <div id="editingInfo" class="editing-info" style="display:none;">
    Editing: <span id="editingPackage"></span>
  </div>

  <div class="form-group">
    <label for="giftPackage">Select Package *</label>
    <select id="giftPackage" required>
      <option value="">-- Select Package --</option>
      <option value="silver-1">Silver Hall Level 1</option>
      <option value="silver-2">Silver Hall Level 2</option>
      <option value="silver-3">Silver Hall Level 3</option>
      <option value="gold-1">Gold Hall Level 1</option>
      <option value="gold-2">Gold Hall Level 2</option>
      <option value="gold-3">Gold Hall Level 3</option>
      <option value="diamond-1">Diamond Hall Level 1</option>
      <option value="diamond-2">Diamond Hall Level 2</option>
      <option value="diamond-3">Diamond Hall Level 3</option>
    </select>
  </div>

  <div class="form-group">
    <label for="giftAmount">Gift Amount (৳) *</label>
    <input type="number" id="giftAmount" step="1" placeholder="150 বা -50" required>
    <div class="note">Positive = balance বাড়বে | Negative = balance কমবে</div>
  </div>

  <div class="form-group">
    <label for="requiredCompleted">Required Completed Tasks *</label>
    <input type="number" id="requiredCompleted" min="0" value="20" placeholder="20" required>
    <div class="note">কতগুলো টাস্ক কমপ্লিট করলে গিফট আনলক হবে</div>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="enabled" checked> Enabled (Active)
    </label>
  </div>

  <div class="button-group">
    <button id="saveBtn" onclick="saveGiftConfig()">Save / Update</button>
    <button id="clearBtn" onclick="clearForm()">Clear Form</button>
  </div>

  <div id="message" style="min-height:28px; text-align:center; font-weight:600; margin-top:15px;"></div>

  <h2>All Gift Box Configurations</h2>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Package</th>
          <th>Gift (৳)</th>
          <th>Required Tasks</th>
          <th>Status</th>
          <th>Last Updated</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="giftTableBody"></tbody>
    </table>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const messageDiv = document.getElementById("message");
const tableBody = document.getElementById("giftTableBody");
const saveBtn = document.getElementById("saveBtn");
const editingInfo = document.getElementById("editingInfo");
const editingPackage = document.getElementById("editingPackage");

let currentEditingId = null;

// Real-time listener for all gift configs
db.collection("giftConfigs")
  .onSnapshot(snap => {
    tableBody.innerHTML = "";
    
    if (snap.empty) {
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#777">কোনো গিফট কনফিগারেশন নেই</td></tr>';
      return;
    }

    snap.forEach(doc => {
      const d = doc.data();
      const id = doc.id;
      const updated = d.updatedAt 
        ? new Date(d.updatedAt.toMillis()).toLocaleString("en-GB", {timeZone: "Asia/Dhaka", hour12: false})
        : "—";

      const packageName = getPackageDisplayName(id);

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${packageName}</td>
        <td>${d.giftAmount ?? '—'}</td>
        <td>${d.requiredCompleted ?? '—'}</td>
        <td class="${d.enabled ? 'status-enabled' : 'status-disabled'}">
          ${d.enabled ? 'Enabled' : 'Disabled'}
        </td>
        <td class="timestamp">${updated}</td>
        <td>
          <button class="action-btn edit-btn" onclick="editGiftConfig('${id}')">
            Edit
          </button>
          <button class="action-btn delete-btn" onclick="deleteGiftConfig('${id}', '${packageName.replace(/'/g, "\\'")}')">
            Delete
          </button>
        </td>
      `;
      tableBody.appendChild(tr);
    });
  }, err => {
    messageDiv.className = "error-msg";
    messageDiv.textContent = "ডাটা লোড করতে সমস্যা: " + err.message;
  });

// Helper: Convert package key to readable name
function getPackageDisplayName(key) {
  if (key === "bronze") return "Bronze Tasks";
  const [hall, level] = key.split("-");
  return `${hall.charAt(0).toUpperCase() + hall.slice(1)} Hall Level ${level}`;
}

// Load form for editing
function editGiftConfig(id) {
  db.collection("giftConfigs").doc(id).get()
    .then(doc => {
      if (!doc.exists) return showMsg("error-msg", "Config not found");

      const d = doc.data();
      document.getElementById("giftPackage").value = id;
      document.getElementById("giftAmount").value = d.giftAmount ?? "";
      document.getElementById("requiredCompleted").value = d.requiredCompleted ?? "20";
      document.getElementById("enabled").checked = d.enabled !== false;

      currentEditingId = id;
      saveBtn.textContent = "Update Config";
      editingInfo.style.display = "block";
      editingPackage.textContent = getPackageDisplayName(id);
      messageDiv.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    })
    .catch(err => showMsg("error-msg", "Load error: " + err.message));
}

// Delete Gift Config
function deleteGiftConfig(id, packageName) {
  if (!confirm(`আপনি কি নিশ্চিত যে "${packageName}" গিফট কনফিগারেশন ডিলিট করতে চান?\n\nএটা ফিরিয়ে আনা যাবে না।`)) {
    return;
  }

  db.collection("giftConfigs").doc(id).delete()
    .then(() => {
      showMsg("success-msg", `"${packageName}" গিফট কনফিগ সফলভাবে ডিলিট হয়েছে!`);
    })
    .catch(err => {
      showMsg("error-msg", "ডিলিট করতে সমস্যা: " + err.message);
      console.error("Delete error:", err);
    });
}

// Clear form
function clearForm() {
  document.getElementById("giftPackage").value = "";
  document.getElementById("giftAmount").value = "";
  document.getElementById("requiredCompleted").value = "20";
  document.getElementById("enabled").checked = true;
  
  currentEditingId = null;
  saveBtn.textContent = "Save Config";
  editingInfo.style.display = "none";
  messageDiv.textContent = "";
}

// Save / Update
async function saveGiftConfig() {
  const packageKey = document.getElementById("giftPackage").value.trim();
  const giftAmount = parseFloat(document.getElementById("giftAmount").value);
  const requiredCompleted = parseInt(document.getElementById("requiredCompleted").value);
  const enabled = document.getElementById("enabled").checked;

  // Validation
  if (!packageKey) {
    return showMsg("error-msg", "প্যাকেজ সিলেক্ট করুন");
  }
  if (isNaN(giftAmount)) {
    return showMsg("error-msg", "Valid Gift Amount দিন");
  }
  if (isNaN(requiredCompleted) || requiredCompleted < 0) {
    return showMsg("error-msg", "Valid Required Tasks সংখ্যা দিন");
  }

  try {
    await db.collection("giftConfigs").doc(packageKey).set({
      packageKey,
      giftAmount,
      requiredCompleted,
      enabled,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    showMsg("success-msg", currentEditingId ? "আপডেট সফল!" : "নতুন গিফট কনফিগ সেভ হয়েছে!");
    setTimeout(clearForm, 1800);
  } catch (e) {
    showMsg("error-msg", "সেভ করতে সমস্যা: " + e.message);
    console.error(e);
  }
}

function showMsg(cls, txt) {
  messageDiv.className = cls;
  messageDiv.textContent = txt;
  setTimeout(() => messageDiv.textContent = "", 5000);
}
</script>
</body>
</html>
