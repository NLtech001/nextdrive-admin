<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - PS Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      text-align: center;
      color: #333;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
      color: #1e3a8a;
    }
    .subtitle {
      margin-bottom: 30px;
      color: #555;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #444;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #162e6e;
      transform: translateY(-2px);
    }
    .error {
      color: #e63939;
      margin-top: 12px;
      font-size: 0.95rem;
      min-height: 20px;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>Admin Login</h1>
    <p class="subtitle">শুধুমাত্র অনুমোদিত ব্যক্তির জন্য</p>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username" required autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="off" />
      </div>

      <button type="submit" class="btn-login">লগইন করুন</button>

      <div class="error" id="errorMsg"></div>
    </form>

    <div class="footer">
      © 2025 PS Group Admin Panel
    </div>
  </div>

  <script>
    const form = document.getElementById('adminLoginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // হার্ডকোডেড super admin credentials
      const validUsername = "superadmin";
      const validPassword = "123@";

      errorMsg.textContent = "";

      if (!username || !password) {
        errorMsg.textContent = "দয়া করে সব ফিল্ড পূরণ করুন";
        return;
      }

      if (username === validUsername && password === validPassword) {
        // সফল লগইন → admin panel এ যাও
        localStorage.setItem('adminLoggedIn', 'true'); // সেশন মনে রাখার জন্য
        window.location.href = "admin.html";
      } else {
        errorMsg.textContent = "ভুল username অথবা password";
      }
    });

    // যদি ইতিমধ্যে লগইন করা থাকে তাহলে সরাসরি admin.html এ নিয়ে যাও
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = "admin.html";
    }
  </script>

</body>
</html>
