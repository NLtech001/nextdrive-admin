<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Registered Users</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 15px;
    }
    .container {
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .table-container {
      overflow-x: auto;
      padding: 0 20px 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      min-width: 900px;
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f9fa;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:hover { background: #f5faff; }
    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .bronze-free { background: #CD7F32; color: white; }
    .no-membership { background: #e63939; color: white; }
    .back-btn {
      display: block;
      margin: 30px auto;
      padding: 12px 40px;
      background: #e63939;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <header>রেজিস্টার্ড ইউজার লিস্ট (Admin)</header>

  <div id="loading" class="loading">লোড হচ্ছে... দয়া করে অপেক্ষা করুন</div>

  <div class="table-container" id="tableContainer" style="display:none;">
    <table id="usersTable">
      <thead>
        <tr>
          <th>UID</th>
          <th>Phone</th>
          <th>Name</th>
          <th>Joined</th>
          <th>Membership Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>

  <div id="noUsers" class="no-users" style="display:none;">
    কোনো রেজিস্টার্ড ইউজার পাওয়া যায়নি।
  </div>

  <button class="back-btn" onclick="window.location.href='admin.html'">Back to Admin Panel</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9",
  measurementId: "G-DS97G2VVZ4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadUsers() {
  const loading = document.getElementById('loading');
  const tableContainer = document.getElementById('tableContainer');
  const noUsers = document.getElementById('noUsers');
  const tbody = document.getElementById('usersBody');

  try {
    const querySnapshot = await db.collection("users")
      .orderBy("createdAt", "desc")
      .get();

    tbody.innerHTML = "";
    loading.style.display = "none";

    if (querySnapshot.empty) {
      noUsers.style.display = "block";
      return;
    }

    tableContainer.style.display = "block";

    querySnapshot.forEach(doc => {
      const data = doc.data();
      const joined = data.createdAt 
        ? new Date(data.createdAt.toDate ? data.createdAt.toDate() : data.createdAt).toLocaleDateString('bn-BD') 
        : "—";

      const membership = data.membership || {};
      let statusHTML = membership.packageName && membership.packageName.includes("Bronze Free") 
        ? `<span class="status bronze-free">${membership.packageName}</span>` 
        : `<span class="status no-membership">No Membership</span>`;

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${doc.id.slice(0,8)}...</td>
        <td>${data.phone || "—"}</td>
        <td>${data.name || data.displayName || "—"}</td>
        <td>${joined}</td>
        <td>${statusHTML}</td>
        <td>
          <button class="edit-btn" onclick="editUser('${doc.id}')">
            <i class="fas fa-edit"></i> Edit
          </button>
        </td>
      `;
      tbody.appendChild(row);
    });
  } catch (err) {
    console.error("Error:", err);
    loading.innerHTML = "লোড করতে সমস্যা: " + err.message;
  }
}

function editUser(uid) {
  window.location.href = `useredit.html?uid=${uid}`;
}

window.onload = loadUsers;
</script>

</body>
</html>
